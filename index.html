<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 전광판 - 인기종목</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #f1f5f9; }

        /* 키오스크/전광판 스타일 메인 컨테이너 */
        .kiosk-container {
            width: 100%; max-width: 420px; background-color: #1e293b; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column;
            position: relative; overflow: hidden; height: 600px; border: 4px solid #334155;
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; background-color: #0f172a; border-bottom: 2px solid #334155; z-index: 50; position: relative; }
        .list-title { font-weight: 800; font-size: 20px; color: #38bdf8; letter-spacing: -0.5px; }

        /* 전광판 뷰포트 (이 안에서만 움직임) */
        .marquee-viewport {
            flex: 1; overflow: hidden; position: relative; width: 100%; background: #000; /* 전광판느낌을 위해 검정 배경 */
        }

        /* 위에서 아래로 흐르는 긴 데이터 띠 */
        #marquee-content {
            display: flex;
            flex-direction: column;
            position: absolute;
            width: 100%;
            top: 0;
            padding: 0 16px;
            /* 애니메이션 적용: marqueeDown, 15초(속도), 무한반복, 선형속도 */
            animation: marqueeDown 15s linear infinite;
        }

        /* 종목 카드 스타일 (어두운 전광판 느낌) */
        .stock-card { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 8px; border-bottom: 1px solid #1e293b; height: 100px; /* 고정 높이 */
            box-sizing: border-box;
        }
        .up { color: #f87171; } /* 상승: 밝은 빨강 */
        .down { color: #60a5fa; } /* 하락: 밝은 파랑 */

        /* 전광판 위아래 그라데이션 가림막 (자연스러운 사라짐 효과) */
        .kiosk-container::before, .kiosk-container::after {
            content: ''; position: absolute; left: 0; width: 100%; height: 60px; z-index: 10; pointer-events: none;
        }
        .kiosk-container::before { top: 68px; background: linear-gradient(to bottom, #000, transparent); }
        .kiosk-container::after { bottom: 84px; background: linear-gradient(to top, #000, transparent); }

        /* 하단 고정 버튼 영역 */
        .fixed-bottom-area { padding: 16px 20px; background: #0f172a; z-index: 50; border-top: 2px solid #334155; }
        .bottom-btn { 
            background: #0284c7; color: white; width: 100%; padding: 16px; border-radius: 12px; 
            font-weight: 700; text-align: center; display: block; text-decoration: none; transition: 0.2s;
        }
        .bottom-btn:active { transform: scale(0.97); background: #0369a1; }

        /* 전광판 무한 스크롤 애니메이션 정의 (위 -> 아래) */
        @keyframes marqueeDown {
            0% { transform: translateY(-50%); } /* 처음 시작 위치 (복제된 데이터의 끝부분) */
            100% { transform: translateY(0%); } /* 마지막 위치 (원본 데이터의 끝부분) */
        }

    </style>
</head>
<body>
    <div class="kiosk-container">
        <header>
            <div class="list-title">LIVE 인기종목 TOP 5</div>
            <div class="text-xs text-gray-500" id="status-time">연결됨</div>
        </header>
        
        <div class="marquee-viewport">
            <div id="marquee-content">
                
                <div class="stock-card" data-rank="1">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-gray-700 text-3xlitalic w-8">1</span>
                        <div>
                            <div class="font-bold text-white text-lg">SK하이닉스</div>
                            <div class="text-xs text-gray-400">거래량 3.0M</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-gray-100 text-lg">1,117,000원</div>
                        <div class="text-sm font-bold up">+7.40% (+77,000원)</div>
                    </div>
                </div>

                <div class="stock-card" data-rank="2">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-gray-700 text-3xl italic w-8">2</span>
                        <div>
                            <div class="font-bold text-white text-lg">삼성전자</div>
                            <div class="text-xs text-gray-400">거래량 12.1M</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-gray-100 text-lg">208,750원</div>
                        <div class="text-sm font-bold up">+3.86% (+7,750원)</div>
                    </div>
                </div>

                <div class="stock-card" data-rank="3">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-gray-700 text-3xl italic w-8">3</span>
                        <div>
                            <div class="font-bold text-white text-lg">대한광통신</div>
                            <div class="text-xs text-gray-400">거래량 32.8M</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-gray-100 text-lg">19,520원</div>
                        <div class="text-sm font-bold down">-1.76% (-350원)</div>
                    </div>
                </div>

                <div class="stock-card" data-rank="4">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-gray-700 text-3xl italic w-8">4</span>
                        <div>
                            <div class="font-bold text-white text-lg">현대차</div>
                            <div class="text-xs text-gray-400">거래량 503.9K</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-gray-100 text-lg">498,000원</div>
                        <div class="text-sm font-bold up">+4.08% (+19,500원)</div>
                    </div>
                </div>

                <div class="stock-card" data-rank="5">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-gray-700 text-3xl italic w-8">5</span>
                        <div>
                            <div class="font-bold text-white text-lg">대우건설</div>
                            <div class="text-xs text-gray-400">거래량 24.0M</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-gray-100 text-lg">23,825원</div>
                        <div class="text-sm font-bold up">+0.32% (+75원)</div>
                    </div>
                </div>
                </div>
        </div>

        <div class="fixed-bottom-area">
            <a href="https://www.iamchart.co.kr" class="bottom-btn">아임차트M 예상 고저가 확인</a>
        </div>
    </div>

    <script>
        // 사용자님의 구글 앱스 스크립트 API 주소 (그대로 유지)
        const API_URL = "https://script.google.com/macros/s/AKfycbztf1UcjdC5kr6teY1xzbT2tOrXV82OEkGZV15tjBwpKR3qFvfcUJvZPiVtTDx8qGmBDQ/exec"; 

        // [핵심] 전광판 무한 루프를 위해 데이터를 복제하는 함수
        function initializeMarquee() {
            const content = document.getElementById('marquee-content');
            const cards = content.querySelectorAll('.stock-card');
            
            // 데이터가 5개일 때만 복제 진행
            if (cards.length === 5) {
                // 이미 복제된 게 있다면 지움
                const clonedCards = content.querySelectorAll('.cloned');
                clonedCards.forEach(card => card.remove());

                // 1~5위 데이터를 복사해서 뒤에 붙임 (총 10개 만듦)
                cards.forEach(card => {
                    const clone = card.cloneNode(true);
                    clone.classList.add('cloned'); // 복제본임을 표시
                    content.appendChild(clone);
                });
                
                // 애니메이션 속도 조절 (데이터가 많아지
