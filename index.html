<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 데이터 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f2f4f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .main-container { width: 100%; max-width: 420px; background-color: white; border-radius: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; min-height: 600px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; color: #8b95a1; transition: 0.2s; border-radius: 12px; }
        .tab-btn.active { color: #3182f6; background-color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stock-card { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #f9fafb; }
        /* 색상 클래스 강제 적용 */
        .text-up { color: #f04452 !important; }   /* 빨간색 */
        .text-down { color: #3182f6 !important; } /* 파란색 */
        .section-title { padding: 12px 24px; background: #f9fafb; font-size: 12px; font-weight: 700; color: #8b95a1; }
        .bottom-btn { background: #4e81f1; color: white; width: calc(100% - 40px); margin: 20px; padding: 18px; border-radius: 18px; font-weight: 600; text-align: center; display: block; text-decoration: none; }
    </style>
</head>
<body>
    <h2 class="text-xl font-bold mb-6">📊 실시간 데이터 센터</h2>
    <div class="main-container">
        <div class="flex bg-gray-100 p-1.5 m-5 rounded-2xl">
            <div id="tab-stock" class="tab-btn active" onclick="changeTab('stock')">인기종목</div>
            <div id="tab-sector" class="tab-btn" onclick="changeTab('sector')">업종별 시세</div>
        </div>
        <div id="content-area" class="flex-1 overflow-y-auto">
            <div class="p-10 text-center text-gray-400">데이터 로딩 중...</div>
        </div>
        <a href="https://www.iamchart.co.kr" class="bottom-btn">아임차트M 예상 고저가 확인하기</a>
    </div>

    <script>
        // 사용자님의 앱스 스크립트 배포 URL을 여기에 넣으세요
        const API_URL = "https://script.google.com/macros/s/AKfycbztf1UcjdC5kr6teY1xzbT2tOrXV82OEkGZV15tjBwpKR3qFvfcUJvZPiVtTDx8qGmBDQ/exec"; 
        
        // 1. 페이지 로드 시 파라미터 체크 로직
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab');
            if (tab === 'sector') {
                changeTab('sector');
            } else {
                loadData('stock');
            }
        };

        async function loadData(type) {
            const container = document.getElementById('content-area');
            container.innerHTML = '<div class="p-10 text-center text-gray-400">데이터 로딩 중...</div>';
            
            try {
                const response = await fetch(`${API_URL}?type=${type}&t=${Date.now()}`);
                const data = await response.json();
                renderList(data, type);
            } catch (error) {
                container.innerHTML = '<div class="p-10 text-center text-red-400">데이터를 불러오지 못했습니다.</div>';
            }
        }

        function renderList(data, type) {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            
            if (data.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-gray-400">표시할 데이터가 없습니다.</div>';
                return;
            }

            data.forEach((item, index) => {
                if (type === 'sector') {
                    if (index === 0) container.innerHTML += '<div class="section-title">업종 등락 상위</div>';
                    if (index === 5) container.innerHTML += '<div class="section-title">업종 등락 하위</div>';
                }

                // 2. 색상 판정 로직 정합 (상승/하락 문자열 매칭)
                let colorClass = "text-gray-500";
                let sign = "";
                
                if (item.status === "상승") {
                    colorClass = "text-up";
                    sign = "▲";
                } else if (item.status === "하락") {
                    colorClass = "text-down";
                    sign = "▼";
                }

                if (type === 'stock') {
                    container.innerHTML += `
                        <div class="stock-card">
                            <div>
                                <div class="font-bold text-gray-800">${item.rank}위. ${item.name}</div>
                                <div class="text-xs text-gray-400">거래량 ${item.volume}</div>
                            </div>
                            <div class="text-right">
                                <div class="font-bold">${Number(item.price).toLocaleString()}원</div>
                                <div class="text-sm font-bold ${colorClass}">${item.status === '상승' ? '+' : ''}${item.rate}</div>
                            </div>
                        </div>`;
                } else {
                    container.innerHTML += `
                        <div class="stock-card">
                            <div class="font-bold text-gray-800">${item.name}</div>
                            <div class="text-lg font-bold ${colorClass}">${sign} ${item.rate}</div>
                        </div>`;
                }
            });
        }

        function changeTab(type) {
            document.getElementById('tab-stock').classList.toggle('active', type === 'stock');
            document.getElementById('tab-sector').classList.toggle('active', type === 'sector');
            loadData(type);
        }
    </script>
</body>
</html>
