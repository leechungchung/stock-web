<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImChart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/dist/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --up: #f04452; --down: #3182f6; --bg: #ffffff; 
            --gray-bg: #f2f4f6; --text-main: #191f28; --text-sub: #8b95a1; --im-orange: #ff8c00;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--gray-bg); margin: 0; padding: 0; display: flex; justify-content: center; color: var(--text-main); letter-spacing: -0.3px; -webkit-font-smoothing: antialiased; }
        
        .main-wrapper { width: 100%; max-width: 500px; min-height: 100vh; background-color: var(--bg); display: flex; flex-direction: column; position: relative; }
        
        /* 상단 네비게이션 & 리프레시 버튼 */
        .header-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: white; border-bottom: 1px solid #f2f4f6; position: sticky; top: 0; z-index: 1000; }
        .tab-nav { display: flex; gap: 20px; }
        .tab-item { font-size: 17px; font-weight: 600; cursor: pointer; color: #adb5bd; padding: 10px 0; position: relative; transition: color 0.2s; }
        .tab-item.active { color: var(--text-main); }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--text-main); border-radius: 2px; }

        .refresh-btn { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 18px; padding: 5px; transition: transform 0.3s; }
        .refresh-btn:active { transform: rotate(180px); }
        .refresh-btn.rotating { animation: rotate 0.8s linear infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .view-container { display: none; padding: 20px 0; min-height: 500px; }
        .view-container.active { display: block; }

        /* 리스트 항목 간격 확대 */
        .item { display: flex; justify-content: space-between; align-items: center; padding: 22px 20px; border-bottom: 1px solid #f9fafb; transition: background 0.2s; }
        .item:active { background: #f9fafb; }
        .info-area { display: flex; align-items: center; gap: 14px; }
        .rank-txt { font-size: 15px; font-weight: 600; color: var(--text-sub); width: 18px; text-align: center; }
        .name-price { display: flex; flex-direction: column; gap: 5px; }
        .name { font-size: 17px; font-weight: 500; color: var(--text-main); }
        .price-txt { font-size: 14px; color: var(--text-sub); }

        .rate-area { text-align: right; }
        .rate-badge { font-size: 16px; font-weight: 600; }
        .상승 { color: var(--up); }
        .하락 { color: var(--down); }
        .보합 { color: var(--text-sub); }

        /* 페이지네이션 */
        .control-section { display: flex; flex-direction: column; align-items: center; gap: 18px; margin-top: 25px; padding-bottom: 35px; }
        .nav-btns { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
        .nav-btn { background: #f2f4f6; border: none; padding: 11px 24px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; color: #4e5968; }
        
        .swiper-pagination-custom { display: flex; gap: 8px; }
        .dot { width: 7px; height: 7px; background: #e5e8eb; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .dot.active { background: #adb5bd; width: 18px; border-radius: 4px; }

        /* 하단 버튼 */
        .footer-link { padding: 0 20px 50px; }
        .btn-link { 
            display: block; background: #191f28; color: white; text-decoration: none; 
            padding: 18px; border-radius: 16px; text-align: center; font-size: 16px; font-weight: 500;
        }
        .logo-im { color: var(--im-orange); }
        .logo-m { font-size: 12px; margin-left: 1px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="header-nav">
            <div class="tab-nav">
                <div class="tab-item active" data-target="stock-view">인기종목</div>
                <div class="tab-item" data-target="sector-view">업종시세</div>
            </div>
            <button class="refresh-btn" id="manual-refresh" title="새로고침">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>

        <div id="stock-view" class="view-container active">
            <div class="swiper" id="stock-swiper">
                <div class="swiper-wrapper" id="stock-wrapper"></div>
                <div class="control-section">
                    <div class="swiper-pagination-custom" id="stock-dots"></div>
                    <div class="nav-btns">
                        <button class="nav-btn" id="stock-prev">이전</button>
                        <button class="nav-btn" id="stock-next">다음</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="sector-view" class="view-container">
            <div class="swiper" id="sector-swiper">
                <div class="swiper-wrapper" id="sector-wrapper"></div>
                <div class="control-section">
                    <div class="nav-btns">
                        <button class="nav-btn" id="sector-prev">이전 그룹</button>
                        <button class="nav-btn" id="sector-next">다음 그룹</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-link">
            <a href="https://www.iamchart.co.kr" class="btn-link">
                아<span class="logo-im">임</span>차트<span class="logo-m">M</span> 에서 추세확인
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQTP2WpINbKU3cPu2j38V0s1-B24-PsJhU5jfvMw0onDjDa_KCEFu19C5UM-ucA85UAg/exec";
        let stockSwiper, sectorSwiper;
        let refreshInterval;

        function switchTab(targetId) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.target === targetId));
            document.querySelectorAll('.view-container').forEach(v => v.classList.toggle('active', v.id === targetId));
            if(stockSwiper) stockSwiper.update();
            if(sectorSwiper) sectorSwiper.update();
        }

        async function fetchData() {
            const refreshBtn = document.getElementById('manual-refresh');
            refreshBtn.classList.add('rotating');
            
            try {
                const [resStock, resSector] = await Promise.all([
                    fetch(`${GAS_URL}?type=stock`), fetch(`${GAS_URL}?type=sector`)
                ]);
                const sData = await resStock.json();
                const vData = await resSector.json();

                renderStock(sData.data);
                renderSector(vData.data, vData.stats_list);
                
                if(stockSwiper) stockSwiper.update();
                if(sectorSwiper) sectorSwiper.update();
                
            } catch (err) {
                console.error("Data fetch failed:", err);
            } finally {
                setTimeout(() => refreshBtn.classList.remove('rotating'), 500);
            }
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchData, 10000); // 10초
        }

        async function init() {
            await fetchData();
            startAutoRefresh();

            stockSwiper = new Swiper('#stock-swiper', { 
                loop: true, navigation: { nextEl: '#stock-next', prevEl: '#stock-prev' },
                on: {
                    init: function() { createDots(this); },
                    slideChange: function() { updateDots(this); }
                }
            });

            sectorSwiper = new Swiper('#sector-swiper', { 
                loop: true, navigation: { nextEl: '#sector-next', prevEl: '#sector-prev' }
            });
        }

        function createDots(swiper) {
            const dotContainer = document.getElementById('stock-dots');
            dotContainer.innerHTML = '';
            for(let i=0; i<6; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => swiper.slideToLoop(i);
                dotContainer.appendChild(dot);
            }
        }

        function updateDots(swiper) {
            const dots = document.querySelectorAll('#stock-dots .dot');
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === swiper.realIndex);
            });
        }

        function renderStock(data) {
            const wrapper = document.getElementById('stock-wrapper');
            const currentSlide = stockSwiper ? stockSwiper.realIndex : 0;
            wrapper.innerHTML = '';
            for (let i = 0; i < 30; i += 5) {
                const chunk = data.slice(i, i + 5);
                let html = '<div class="swiper-slide">';
                chunk.forEach(item => {
                    html += `<div class="item">
                        <div class="info-area">
                            <span class="rank-txt">${item.rank}</span>
                            <div class="name-price">
                                <span class="name">${item.name}</span>
                                <span class="price-txt">${item.price}원</span>
                            </div>
                        </div>
                        <div class="rate-area"><span class="rate-badge ${item.status}">${item.rate}</span></div>
                    </div>`;
                });
                wrapper.innerHTML += html + '</div>';
            }
            if(stockSwiper) stockSwiper.slideToLoop(currentSlide, 0);
        }

        function renderSector(data, stats) {
            const wrapper = document.getElementById('sector-wrapper');
            const currentSlide = sectorSwiper ? sectorSwiper.realIndex : 0;
            wrapper.innerHTML = '';
            const groups = [
                { title: "📈 등락 상위 업종", d: data.slice(0, 5), s: stats.slice(0, 5) },
                { title: "📉 등락 하위 업종", d: data.slice(5, 10), s: stats.slice(5, 10) }
            ];
            groups.forEach(g => {
                let html = `<div class="swiper-slide"><h4 style="margin: 0 20px 10px; font-size:14px; color:var(--text-sub); font-weight:500;">${g.title}</h4>`;
                g.d.forEach((item, idx) => {
                    html += `<div class="item">
                        <div class="name-price">
                            <span class="name">${item.name}</span>
                            <span class="price-txt" style="font-size:12px;">${g.s[idx] || ""}</span>
                        </div>
                        <div class="rate-area"><span class="rate-badge ${item.status}">${item.rate}</span></div>
                    </div>`;
                });
                wrapper.innerHTML += html + '</div>';
            });
            if(sectorSwiper) sectorSwiper.slideToLoop(currentSlide, 0);
        }

        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.target));
        });

        document.getElementById('manual-refresh').addEventListener('click', () => {
            fetchData();
            startAutoRefresh(); // 수동 클릭 시 타이머 리셋
        });

        init();
    </script>
</body>
</html>
