<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인기종목 TOP 30</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f2f4f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* 메인 컨테이너 디자인 보정 */
        .main-container {
            width: 100%; max-width: 420px; background-color: white; border-radius: 32px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column;
            position: relative; overflow: hidden; height: 680px;
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 28px 24px 10px 24px; z-index: 30; }
        .list-title { font-weight: 700; font-size: 22px; color: #191f28; }

        /* 슬라이더 영역: 배경 고정, 텍스트만 이동 */
        .slider-viewport {
            flex: 1; overflow: hidden; position: relative; padding: 0 24px;
        }

        #slider-wrapper {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
        }

        .page {
            min-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stock-card { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f9fafb; }
        .up { color: #f04452; } .down { color: #3182f6; }

        /* 내비게이션 컨트롤러 */
        .nav-controls { display: flex; justify-content: center; align-items: center; gap: 16px; padding: 10px 0 20px 0; }
        .nav-btn { background: #f2f4f6; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; transition: 0.2s; }
        .nav-btn:hover { background: #e5e8eb; }

        .dots { display: flex; gap: 6px; }
        .dot { width: 6px; height: 6px; background: #e5e8eb; border-radius: 50%; transition: 0.3s; cursor: pointer; }
        .dot.active { background: #3182f6; width: 16px; border-radius: 4px; }

        /* 하단 버튼 영역 디자인 보정 (동그라미 친 부분 해결) */
        .fixed-bottom-area {
            padding: 0 20px 24px 20px; background: white;
        }
        .bottom-btn { 
            background: #4e81f1; color: white; width: 100%; padding: 18px; border-radius: 20px; 
            font-weight: 600; text-align: center; display: block; text-decoration: none;
            box-shadow: 0 4px 12px rgba(78, 129, 241, 0.2); transition: 0.2s;
        }
        .bottom-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* 새로고침 애니메이션 */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-icon { animation: rotate 1s linear infinite; }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <div class="list-title">인기종목 TOP 30</div>
            <div id="refresh-btn" class="cursor-pointer p-1" onclick="loadData()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </div>
        </header>
        
        <div class="slider-viewport" id="swipe-area">
            <div id="slider-wrapper">
                <div class="w-full text-center py-40 text-gray-400">데이터를 불러오는 중...</div>
            </div>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" onclick="prevPage()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8b95a1" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="dots" id="dots-container"></div>
            <button class="nav-btn" onclick="nextPage()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8b95a1" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

        <div class="fixed-bottom-area">
            <a href="https://www.iamchart.co.kr" class="bottom-btn">아임차트M에서 예상 고저가 확인하기</a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbztf1UcjdC5kr6teY1xzbT2tOrXV82OEkGZV15tjBwpKR3qFvfcUJvZPiVtTDx8qGmBDQ/exec"; 
        let currentPage = 0;
        let totalPages = 0;

        async function loadData() {
            const refreshIcon = document.querySelector('#refresh-btn svg');
            refreshIcon.classList.add('loading-icon'); // 새로고침 애니메이션 시작

            try {
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    renderSlider(data);
                }
            } catch (e) {
                console.error("연결 실패:", e);
                document.getElementById('slider-wrapper').innerHTML = 
                    `<div class="w-full text-center py-40 text-red-400">연결 지연... 잠시 후 다시 시도</div>`;
            } finally {
                setTimeout(() => refreshIcon.classList.remove('loading-icon'), 500);
            }
        }

        function renderSlider(data) {
            const wrapper = document.getElementById('slider-wrapper');
            const dotsContainer = document.getElementById('dots-container');
            wrapper.innerHTML = '';
            dotsContainer.innerHTML = '';

            const itemsPerPage = 5;
            totalPages = Math.ceil(data.length / itemsPerPage);

            for (let i = 0; i < totalPages; i++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                
                const pageData = data.slice(i * itemsPerPage, (i + 1) * itemsPerPage);
                pageData.forEach(s => {
                    const color = s.status === "상승" ? 'up' : (s.status === "하락" ? 'down' : 'text-gray-500');
                    const prefix = s.status === "상승" ? '+' : '';
                    pageDiv.innerHTML += `
                        <div class="stock-card">
                            <div class="flex items-center gap-3">
                                <span class="font-bold text-gray-200 text-xl w-6 italic">${s.rank}</span>
                                <div>
                                    <div class="font-bold text-gray-800 text-[16px]">${s.name}</div>
                                    <div class="text-[12px] text-gray-400">거래량 ${s.volume}</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="font-bold text-[#191f28] text-[16px]">${Number(s.price).toLocaleString()}원</div>
                                <div class="text-[13px] font-bold ${color}">${prefix}${s.rate} (${prefix}${Number(s.change).toLocaleString()}원)</div>
                            </div>
                        </div>`;
                });
                wrapper.appendChild(pageDiv);
                
                const dot = document.createElement('div');
                dot.className = `dot ${i === currentPage ? 'active' : ''}`;
                dot.onclick = () => movePage(i);
                dotsContainer.appendChild(dot);
            }
            movePage(currentPage);
        }

        function movePage(index) {
            if (index < 0 || index >= totalPages) return;
            currentPage = index;
            document.getElementById('slider-wrapper').style.transform = `translateX(-${index * 100}%)`;
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === index));
        }

        function prevPage() { movePage(currentPage - 1); }
        function nextPage() { movePage(currentPage + 1); }

        // 스와이프 로직
        let startX = 0;
        const swipeArea = document.getElementById('swipe-area');
        swipeArea.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        swipeArea.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) nextPage();
            if (endX - startX > 50) prevPage();
        });

        loadData();
        setInterval(loadData, 60000); // 1분마다 자동 갱신
    </script>
</body>
</html>
