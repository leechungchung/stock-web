<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 인기 종목</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f2f4f6; }
        .stock-card { background: white; border-radius: 20px; transition: transform 0.2s; }
        .stock-card:active { transform: scale(0.98); }
        .up { color: #f04452; }
        .down { color: #3182f6; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <header class="mb-6 mt-4">
            <h1 class="text-2xl font-bold text-gray-900">실시간 인기 종목</h1>
            <p class="text-sm text-gray-500" id="update-time">데이터를 불러오는 중...</p>
        </header>

        <div id="stock-list" class="space-y-3">
            </div>
    </div>

    <script>
        // ⚠️ 주의: 여기에 본인의 구글 앱스 스크립트 웹 앱 URL을 붙여넣으세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbztf1UcjdC5kr6teY1xzbT2tOrXV82OEkGZV15tjBwpKR3qFvfcUJvZPiVtTDx8qGmBDQ/exec";

        async function fetchStocks() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const list = document.getElementById('stock-list');
                const time = document.getElementById('update-time');
                list.innerHTML = '';
                
                data.forEach(stock => {
                    const isUp = stock.status === "상승";
                    const colorClass = isUp ? 'up' : (stock.status === "하락" ? 'down' : 'text-gray-500');
                    const prefix = isUp ? '+' : '';

                    list.innerHTML += `
                        <div class="stock-card p-5 flex items-center justify-between shadow-sm">
                            <div class="flex items-center space-x-4">
                                <span class="text-lg font-bold text-gray-400 w-6">${stock.rank}</span>
                                <div>
                                    <h3 class="font-bold text-gray-900">${stock.name}</h3>
                                    <p class="text-xs text-gray-500">거래량 ${stock.volume}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-gray-900">${Number(stock.price).toLocaleString()}원</p>
                                <p class="text-sm font-semibold ${colorClass}">${prefix}${stock.rate}</p>
                            </div>
                        </div>
                    `;
                });
                
                time.innerText = new Date().toLocaleTimeString() + " 기준 업데이트됨";
            } catch (error) {
                console.error("데이터 로딩 실패:", error);
                document.getElementById('update-time').innerText = "데이터를 불러오지 못했습니다.";
            }
        }

        fetchStocks();
    </script>
</body>
</html>
