<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImChart Financial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --up: #f04452; --down: #3182f6; --bg: #f2f4f6; --card-bg: #ffffff; 
            --text-main: #191f28; --text-sub: #8b95a1; --im-orange: #ff8c00;
            --kospi: #3182f6; --kosdaq: #00c73c;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; color: var(--text-main); min-height: 100vh; }
        .main-wrapper { width: 100%; max-width: 500px; background-color: var(--card-bg); display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); min-height: 100vh; }
        
        /* 헤더 & 탭 순서 변경: 보호예수가 1번 */
        .header-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: white; border-bottom: 1px solid #f2f4f6; position: sticky; top: 0; z-index: 1000; height: 60px; }
        .tab-nav { display: flex; gap: 15px; height: 100%; overflow-x: auto; scrollbar-width: none; }
        .tab-item { font-size: 15px; font-weight: 600; cursor: pointer; color: #adb5bd; display: flex; align-items: center; position: relative; white-space: nowrap; }
        .tab-item.active { color: var(--text-main); }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--text-main); border-radius: 2px; }
        .refresh-btn { background: #f2f4f6; border: none; color: #4e5968; cursor: pointer; font-size: 16px; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        /* 컨텐츠 영역 */
        .view-container { display: none; flex: 1; }
        .view-container.active { display: block; }

        /* 캘린더 UI 개선 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; gap: 10px; }
        .cal-title-group { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; flex: 1; justify-content: center; }
        .cal-selector { cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.2s; }
        .cal-selector:hover { background: #f2f4f6; color: var(--im-orange); }
        
        .today-btn { width: 40px; height: 40px; border: 1px solid #e5e8eb; border-radius: 10px; background: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--im-orange); line-height: 1.2; flex-shrink: 0; }
        .today-btn span { font-size: 14px; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 10px; }
        .day-label { text-align: center; font-size: 12px; color: var(--text-sub); padding-bottom: 10px; }
        .date-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; position: relative; font-size: 14px; font-weight: 500; }
        .date-cell.today { color: var(--im-orange); font-weight: 800; }
        .date-cell.selected { background: var(--text-main); color: white !important; }
        .has-event::after { content: ''; width: 4px; height: 4px; background: var(--up); border-radius: 50%; position: absolute; bottom: 6px; }

        /* 셀렉터 팝업(심플) */
        .selector-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; }
        .selector-modal { background:white; padding:20px; border-radius:20px; width:80%; max-width:300px; max-height:400px; overflow-y:auto; }
        .select-item { padding:15px; text-align:center; border-bottom:1px solid #f2f4f6; cursor:pointer; font-weight:600; }
        .select-item:last-child { border:none; }

        /* 기존 리스트 스타일 */
        .item { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #f9fafb; }
        .lockup-card { background: white; padding: 15px; border-radius: 12px; margin: 0 20px 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f2f4f6; text-decoration: none; color: inherit; }
        .market-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-bottom: 4px; display: inline-block; }
        .tag-kospi { background: #eef4ff; color: var(--kospi); }
        .tag-kosdaq { background: #effff3; color: var(--kosdaq); }
        .footer-link { padding: 20px; background: #fafbfc; border-top: 1px solid #f2f4f6; }
        .btn-link { display: block; background: #191f28; color: white; text-decoration: none; padding: 18px; border-radius: 16px; text-align: center; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="header-nav">
            <div class="tab-nav">
                <div class="tab-item active" data-target="lockup-view" id="tab-lockup">보호예수</div>
                <div class="tab-item" data-target="stock-view" id="tab-stock">인기종목</div>
                <div class="tab-item" data-target="sector-view" id="tab-sector">업종시세</div>
            </div>
            <button class="refresh-btn" onclick="fetchData()"><i class="fa-solid fa-arrows-rotate"></i></button>
        </div>

        <div id="lockup-view" class="view-container active">
            <div class="calendar-header">
                <button class="nav-btn" style="padding: 10px 15px;" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="cal-title-group">
                    <span class="cal-selector" onclick="openYearSelector()" id="cal-year">2026년</span>
                    <span class="cal-selector" onclick="openMonthSelector()" id="cal-month">04월</span>
                </div>
                <button class="nav-btn" style="padding: 10px 15px;" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
                <button class="today-btn" onclick="resetToToday()">
                    <span id="today-day">20</span>오늘
                </button>
            </div>
            <div class="cal-grid">
                <div class="day-label">일</div><div class="day-label">월</div><div class="day-label">화</div><div class="day-label">수</div><div class="day-label">목</div><div class="day-label">금</div><div class="day-label">토</div>
            </div>
            <div class="cal-grid" id="calendar-body"></div>
            <div style="padding: 20px 20px 10px;"><span id="selected-date-txt" style="font-size:14px; font-weight:700;">날짜를 선택하세요</span></div>
            <div id="event-detail-list"></div>
        </div>

        <div id="stock-view" class="view-container">
            <div class="swiper" id="stock-swiper"><div class="swiper-wrapper" id="stock-wrapper"></div></div>
            </div>

        <div id="sector-view" class="view-container">
            <div class="swiper" id="sector-swiper"><div class="swiper-wrapper" id="sector-wrapper"></div></div>
            </div>

        <div class="footer-link"><a href="https://www.iamchart.co.kr" class="btn-link">아<span style="color:var(--im-orange)">임</span>차트M 에서 상세분석</a></div>
    </div>

    <div id="selector-overlay" class="selector-overlay" onclick="closeSelector()">
        <div class="selector-modal" id="selector-modal" onclick="event.stopPropagation()"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQTP2WpINbKU3cPu2j38V0s1-B24-PsJhU5jfvMw0onDjDa_KCEFu19C5UM-ucA85UAg/exec";
        let lockupData = [], currentViewDate = new Date(), selectedDateStr = "";

        // 탭 파라미터 확인 및 설정
        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab'); // index.html?tab=stock 형태
            if (tab === 'stock') switchTab('tab-stock');
            else if (tab === 'sector') switchTab('tab-sector');
            else switchTab('tab-lockup');
        }

        function switchTab(tabId) {
            const tab = document.getElementById(tabId);
            if (!tab) return;
            document.querySelectorAll('.tab-item, .view-container').forEach(el => el.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.target).classList.add('active');
        }

        async function fetchData() {
            const today = new Date();
            document.getElementById('today-day').innerText = today.getDate();
            
            try {
                const res = await fetch(`${GAS_URL}?type=lockup`);
                const result = await res.json();
                lockupData = result.data || [];
                renderCalendar();
            } catch (e) { alert("데이터를 불러오지 못했습니다. 배포 설정을 확인하세요."); }
        }

        function renderCalendar() {
            const year = currentViewDate.getFullYear(), month = currentViewDate.getMonth();
            document.getElementById('cal-year').innerText = year + "년";
            document.getElementById('cal-month').innerText = String(month + 1).padStart(2, '0') + "월";

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const calBody = document.getElementById('calendar-body');
            calBody.innerHTML = '';

            for (let i = 0; i < firstDay; i++) calBody.innerHTML += '<div></div>';
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasEvent = lockupData.some(item => item.date === dateStr);
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                const cell = document.createElement('div');
                cell.className = `date-cell ${hasEvent ? 'has-event' : ''} ${isToday ? 'today' : ''} ${selectedDateStr === dateStr ? 'selected' : ''}`;
                cell.innerText = d;
                cell.onclick = () => selectDate(dateStr);
                calBody.appendChild(cell);
            }
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendar();
            const dayEvents = lockupData.filter(item => item.date === dateStr);
            document.getElementById('selected-date-txt').innerText = dateStr + " 해제 일정";
            const listArea = document.getElementById('event-detail-list');
            listArea.innerHTML = dayEvents.length === 0 ? '<div style="text-align:center; padding:40px; color:#8b95a1;">일정이 없습니다.</div>' : '';
            dayEvents.forEach(ev => {
                const amount = (ev.amount / 1000).toLocaleString(undefined, {maximumFractionDigits: 0}) + "천 주";
                listArea.innerHTML += `<a href="https://finance.naver.com/item/main.naver?code=${ev.code}" target="_blank" class="lockup-card"><div><span class="market-tag ${ev.market==='코스피'?'tag-kospi':'tag-kosdaq'}">${ev.market}</span><span style="display:block; font-weight:600;">${ev.name}</span></div><div style="text-align:right;"><span style="font-weight:700;">${amount}</span><br><span style="font-size:12px; color:#8b95a1;">${(ev.ratio*100).toFixed(2)}%</span></div></a>`;
            });
        }

        /* UI 조작 기능 */
        function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }
        function resetToToday() { currentViewDate = new Date(); selectDate(new Date().toISOString().split('T')[0]); }

        function openYearSelector() {
            const modal = document.getElementById('selector-modal');
            modal.innerHTML = '';
            for(let y=2024; y<=2030; y++) {
                modal.innerHTML += `<div class="select-item" onclick="setYear(${y})">${y}년</div>`;
            }
            document.getElementById('selector-overlay').style.display = 'flex';
        }

        function openMonthSelector() {
            const modal = document.getElementById('selector-modal');
            modal.innerHTML = '';
            for(let m=1; m<=12; m++) {
                modal.innerHTML += `<div class="select-item" onclick="setMonth(${m-1})">${m}월</div>`;
            }
            document.getElementById('selector-overlay').style.display = 'flex';
        }

        function setYear(y) { currentViewDate.setFullYear(y); closeSelector(); renderCalendar(); }
        function setMonth(m) { currentViewDate.setMonth(m); closeSelector(); renderCalendar(); }
        function closeSelector() { document.getElementById('selector-overlay').style.display = 'none'; }

        window.onload = () => {
            fetchData();
            checkUrlParams();
            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.onclick = () => switchTab(tab.id);
            });
        };
    </script>
</body>
</html>
