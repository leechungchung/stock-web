<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 실시간 데이터 센터</title>
    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px; color: #1c1c1e;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 20px; font-size: 1.2rem; }

        /* 탭 메뉴 스타일 */
        .tabs {
            display: flex;
            background: #e5e5ea;
            padding: 2px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            color: #8e8e93;
        }
        .tab-btn.active {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: var(--primary-color);
        }

        /* 데이터 카드 스타일 */
        .content-section { display: none; }
        .content-section.active { display: block; }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .name { font-weight: bold; font-size: 1.05rem; }
        .rate { font-size: 0.95rem; font-weight: bold; }
        .details { font-size: 0.85rem; color: #8e8e93; }
        
        .up { color: #ff3b30; }   /* 상승: 빨간색 */
        .down { color: #007aff; } /* 하락: 파란색 */
        
        #loading { text-align: center; padding: 50px; color: #8e8e93; font-size: 0.9rem; }
        .group-title { margin: 20px 0 10px 5px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 실시간 데이터 센터</h2>

    <div class="tabs">
        <button class="tab-btn" id="btn-popular" onclick="switchTab('popular')">인기종목</button>
        <button class="tab-btn" id="btn-upjong" onclick="switchTab('upjong')">업종별 시세</button>
    </div>

    <div id="loading">데이터를 불러오는 중입니다...</div>

    <div id="section-popular" class="content-section"></div>

    <div id="section-upjong" class="content-section"></div>
</div>

<script>
    // 주신 구글 앱스 스크립트 배포 URL 적용 완료
    const API_URL = "https://script.google.com/macros/s/AKfycbztf1UcjdC5kr6teY1xzbT2tOrXV82OEkGZV15tjBwpKR3qFvfcUJvZPiVtTDx8qGmBDQ/exec";

    // URL 뒤에 ?tab=upjong 등이 붙어있는지 확인하여 초기 탭 결정
    const urlParams = new URLSearchParams(window.location.search);
    let currentTab = urlParams.get('tab') || 'popular';

    function switchTab(tab) {
        currentTab = tab;
        // UI 업데이트
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        
        document.getElementById('btn-' + tab).classList.add('active');
        document.getElementById('section-' + tab).classList.add('active');
        
        fetchData(tab);
    }

    async function fetchData(type) {
        const section = document.getElementById('section-' + type);
        section.innerHTML = ''; // 기존 내용 삭제
        document.getElementById('loading').style.display = 'block';

        try {
            const response = await fetch(`${API_URL}?type=${type}`);
            const data = await response.json();
            
            document.getElementById('loading').style.display = 'none';

            if (type === 'popular') {
                data.forEach(item => {
                    const colorClass = item.rate.includes('+') ? 'up' : 'down';
                    section.innerHTML += `
                        <div class="card">
                            <div class="row">
                                <span class="name">${item.rank}위. ${item.name}</span>
                                <span class="rate ${colorClass}">${item.rate}</span>
                            </div>
                            <div class="details">현재가: ${Number(item.price).toLocaleString()}원 | 거래량: ${item.volume}</div>
                        </div>`;
                });
            } else {
                let html = "<div class='group-title'>📈 업종 상위</div>";
                data.forEach((item, index) => {
                    if (item.type === "하락" && !html.includes("📉 업종 하위")) {
                        html += "<div class='group-title' style='margin-top:25px;'>📉 업종 하위</div>";
                    }
                    
                    const colorClass = item.rate.includes('+') ? 'up' : 'down';
                    html += `
                        <div class="card">
                            <div class="row">
                                <span class="name">${item.name}</span>
                                <span class="rate ${colorClass}">${item.rate}</span>
                            </div>
                            <div class="details">상승: ${item.up} | 보합: ${item.stay} | 하락: ${item.down} (총 ${item.total}개)</div>
                        </div>`;
                });
                section.innerHTML = html;
            }
        } catch (error) {
            document.getElementById('loading').innerText = '데이터 로드 실패. API 배포 설정을 확인해주세요.';
            console.error(error);
        }
    }

    // 페이지 로드 시 시작
    window.onload = () => switchTab(currentTab);
</script>

</body>
</html>
