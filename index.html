<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImChart 실시간 시황</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root { --primary-color: #2563eb; --up-color: #ef4444; --down-color: #3b82f6; --bg-color: #f4f6f8; --im-orange: #ff8c00; }
        
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; display: flex; justify-content: center; -webkit-font-smoothing: antialiased; }
        
        .main-wrapper { width: 100%; max-width: 500px; min-height: 100vh; background-color: #ffffff; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        
        /* 상단 탭 - 텍스트 사이즈 조정 및 볼드 제거 */
        .tab-nav { display: flex; background: white; border-bottom: 1px solid #eeeeee; position: sticky; top: 0; z-index: 1000; }
        .tab-item { flex: 1; text-align: center; padding: 15px; cursor: pointer; color: #888888; font-size: 15px; font-weight: 400; }
        .tab-item.active { color: #333333; border-bottom: 2px solid #333333; }

        .view-container { display: none; padding: 15px; }
        .view-container.active { display: block; }

        /* 페이지 번호 */
        .page-indicator { text-align: right; font-size: 13px; color: #bbbbbb; margin-bottom: 10px; padding-right: 5px; }

        /* 리스트 스타일 - 텍스트 사이즈 축소 및 일반 굵기 */
        .card { background: white; border-radius: 12px; border: 1px solid #f0f0f0; overflow: hidden; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 16px 15px; border-bottom: 1px solid #f9f9f9; }
        .item:last-child { border-bottom: none; }
        
        .info { display: flex; flex-direction: column; gap: 3px; }
        .name { font-size: 16px; color: #333333; font-weight: 400; }
        .sub-info { font-size: 12px; color: #999999; }
        .sector-stats { font-size: 11px; color: #aaaaaa; margin-top: 1px; }
        
        .rate-box { text-align: right; }
        .rate { font-size: 18px; font-weight: 400; } /* 볼드 제거 */
        .change { font-size: 12px; margin-top: 1px; }

        .상승 { color: var(--up-color); }
        .하락 { color: var(--down-color); }
        .보합 { color: #888888; }

        /* 네비게이션 버튼 */
        .nav-btns { display: flex; justify-content: center; gap: 10px; margin-top: 20px; margin-bottom: 20px; }
        .nav-btn { background: #fdfdfd; border: 1px solid #eeeeee; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 13px; color: #666666; }

        /* 하단 버튼 - 로고 스타일 적용 */
        .footer-link { padding: 10px 15px 40px 15px; text-align: center; }
        .btn-link { 
            display: block; 
            background: #333333; 
            color: white; 
            text-decoration: none; 
            padding: 16px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 400; 
        }
        .btn-link .logo-im { color: var(--im-orange); }
        .btn-link .logo-m { font-size: 11px; margin-left: 2px; vertical-align: baseline; }
        
        #loading { text-align: center; padding: 80px 20px; color: #cccccc; font-size: 14px; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="tab-nav">
            <div class="tab-item active" data-target="stock-view">실시간 인기종목</div>
            <div class="tab-item" data-target="sector-view">업종별 시세</div>
        </div>

        <div id="stock-view" class="view-container active">
            <div class="page-indicator" id="stock-page-num">1 / 6</div>
            <div class="swiper" id="stock-swiper">
                <div class="swiper-wrapper" id="stock-wrapper"></div>
                <div class="nav-btns">
                    <button class="nav-btn" id="stock-prev">이전</button>
                    <button class="nav-btn" id="stock-next">다음</button>
                </div>
            </div>
        </div>

        <div id="sector-view" class="view-container">
            <div class="page-indicator" id="sector-page-num">1 / 2</div>
            <div class="swiper" id="sector-swiper">
                <div class="swiper-wrapper" id="sector-wrapper"></div>
                <div class="nav-btns">
                    <button class="nav-btn" id="sector-prev">상위 / 하위 전환</button>
                </div>
            </div>
        </div>

        <div class="footer-link">
            <a href="https://www.iamchart.co.kr" class="btn-link">
                <span class="logo-im">아</span>차트<span class="logo-m">M</span> 에서 추세확인
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQTP2WpINbKU3cPu2j38V0s1-B24-PsJhU5jfvMw0onDjDa_KCEFu19C5UM-ucA85UAg/exec";
        let stockSwiper, sectorSwiper;

        function switchTab(targetId) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.target === targetId));
            document.querySelectorAll('.view-container').forEach(v => v.classList.toggle('active', v.id === targetId));
            if(stockSwiper) stockSwiper.update();
            if(sectorSwiper) sectorSwiper.update();
        }

        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.target));
        });

        async function init() {
            try {
                const [resStock, resSector] = await Promise.all([
                    fetch(`${GAS_URL}?type=stock`), fetch(`${GAS_URL}?type=sector`)
                ]);
                const sData = await resStock.json();
                const vData = await resSector.json();

                renderStock(sData.data);
                renderSector(vData.data, vData.stats_list);

                stockSwiper = new Swiper('#stock-swiper', { 
                    loop: true, navigation: { nextEl: '#stock-next', prevEl: '#stock-prev' },
                    on: { slideChange: function() { document.getElementById('stock-page-num').innerText = `${this.realIndex + 1} / 6`; } }
                });

                sectorSwiper = new Swiper('#sector-swiper', { 
                    loop: true, navigation: { nextEl: '#sector-prev' },
                    on: { slideChange: function() { document.getElementById('sector-page-num').innerText = `${this.realIndex + 1} / 2`; } }
                });

                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('tab') === 'sector') switchTab('sector-view');

            } catch (err) { console.error(err); }
        }

        function renderStock(data) {
            const wrapper = document.getElementById('stock-wrapper');
            wrapper.innerHTML = '';
            for (let i = 0; i < 30; i += 5) {
                const chunk = data.slice(i, i + 5);
                let html = '<div class="swiper-slide"><div class="card">';
                chunk.forEach(item => {
                    html += `<div class="item">
                        <div class="info"><span class="name">${item.rank}. ${item.name}</span><span class="sub-info">${item.price}원 | ${item.volume}</span></div>
                        <div class="rate-box ${item.status}"><div class="rate">${item.rate}</div><div class="change">${item.change}</div></div>
                    </div>`;
                });
                wrapper.innerHTML += html + '</div></div>';
            }
        }

        function renderSector(data, stats) {
            const wrapper = document.getElementById('sector-wrapper');
            wrapper.innerHTML = '';
            const groups = [
                { title: "📈 등락 상위 업종", d: data.slice(0, 5), s: stats.slice(0, 5) },
                { title: "📉 등락 하위 업종", d: data.slice(5, 10), s: stats.slice(5, 10) }
            ];
            groups.forEach(g => {
                let html = `<div class="swiper-slide"><h4 style="margin: 5px 10px; font-size:14px; color:#666; font-weight:400;">${g.title}</h4><div class="card">`;
                g.d.forEach((item, idx) => {
                    html += `<div class="item">
                        <div class="info"><span class="name">${item.name}</span><span class="sector-stats">${g.s[idx] || ""}</span></div>
                        <div class="rate-box ${item.status}"><div class="rate">${item.rate}</div></div>
                    </div>`;
                });
                wrapper.innerHTML += html + '</div></div>';
            });
        }
        init();
    </script>
</body>
</html>
