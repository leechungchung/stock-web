<script>
    const API_URL = "본인의_최신_배포_URL";
    
    // 페이지 로드 시 URL 파라미터를 확인하여 탭 결정
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        if (tab === 'sector') {
            changeTab('sector');
        } else {
            loadData('stock');
        }
    };

    async function loadData(type) {
        const container = document.getElementById('content-area');
        container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
        try {
            const res = await fetch(`${API_URL}?type=${type}&t=${Date.now()}`);
            const data = await res.json();
            renderList(data, type);
        } catch (e) { container.innerHTML = '<div class="text-center py-20 text-gray-400">데이터를 불러올 수 없습니다.</div>'; }
    }

    function renderList(data, type) {
        const container = document.getElementById('content-area');
        container.innerHTML = '';
        data.forEach((item, index) => {
            if (type === 'sector') {
                if (index === 0) container.innerHTML += '<div class="section-title">업종 등락 상위</div>';
                if (index === 5) container.innerHTML += '<div class="section-title">업종 등락 하위</div>';
            }
            // status 판정 (GAS에서 넘어온 '상승'/'하락' 문자열 기준 색상 적용)
            const color = item.status === "상승" ? 'up' : (item.status === "하락" ? 'down' : 'text-gray-500');
            const sign = item.status === "상승" ? '▲' : (item.status === "하락" ? '▼' : '-');

            if (type === 'stock') {
                container.innerHTML += `<div class="stock-card"><div><div class="font-bold text-gray-800">${item.name}</div><div class="text-xs text-gray-400">거래량 ${item.volume}</div></div><div class="text-right"><div class="font-bold">${Number(item.price).toLocaleString()}원</div><div class="text-sm font-bold ${color}">${item.status === "상승" ? '+' : ''}${item.rate}</div></div></div>`;
            } else {
                container.innerHTML += `<div class="stock-card"><div><div class="font-bold text-gray-800">${item.name}</div></div><div class="text-right"><div class="text-lg font-bold ${color}">${sign} ${item.rate}</div></div></div>`;
            }
        });
    }

    function changeTab(type) {
        document.getElementById('tab-stock').classList.toggle('active', type === 'stock');
        document.getElementById('tab-sector').classList.toggle('active', type === 'sector');
        loadData(type);
    }
</script>
